<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta
      name="description"
      content="Mathemator, encyclopédie interactive des mathématiques : mathématiciens, domaines, théorèmes, problèmes, bibliothèque, exercices, quiz, laboratoire et histoire."
    />
    <meta name="theme-color" content="#f7f4ed" />
    <title>Mathemator — Encyclopédie des mathématiques</title>
    <link rel="icon" href="/assets/icon-192.svg" type="image/svg+xml" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/assets/icon-192.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400..800;1,6..72,400..800&family=Public+Sans:wght@400;500;600;700&display=swap"
    />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.css" />
    <link rel="stylesheet" href="/src/styles.css" />
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.10/dist/katex.min.js"></script>
  </head>
  <body>
    <div id="app">
      <header class="masthead">
        <button class="menu-btn" id="menuButton" type="button" data-act="menu-toggle" aria-label="Sommaire" aria-controls="screen">
          <span></span><span></span><span></span>
        </button>
        <div class="masthead-title">
          <p class="eyebrow">Encyclopédie des mathématiques</p>
          <h1>Mathemator</h1>
        </div>
        <p class="chapter-label" id="chapterLabel">Édition 2026</p>
      </header>

      <main class="screen" id="screen">
        <div class="boot">Chargement de l’encyclopédie…</div>
      </main>

      <nav class="bottom-nav" id="bottomNav" aria-label="Chapitres"></nav>
    </div>

    <script type="module" src="/src/app.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("/service-worker.js").catch(() => {});
        });
      }
    </script>
  </body>
</html>
